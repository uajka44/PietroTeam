<style>

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {

    color: var(--cream);
    font-family: 'DM Sans', sans-serif;

  }
  .header { background: var(--surface); padding: 20px 20px 0; border-bottom: 1px solid #3D1418; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px; }
  .logo-main { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--accent2); letter-spacing: 0.5px; }
  .logo-sub { font-size: 12px; font-weight: 300; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .search-wrap { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-box { flex: 1; background: var(--card); border: 1.5px solid #3D1418; border-radius: 12px; padding: 13px 16px; color: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; transition: border-color .2s; }
  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: var(--accent); }
  .mic-btn { background: var(--card); border: 1.5px solid #3D1418; border-radius: 12px; width: 50px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; color: var(--muted); font-size: 20px; }
  .mic-btn.listening { border-color: #e05050; background: #3a1010; color: #e05050; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(224,80,80,.4)} 50%{box-shadow:0 0 0 8px rgba(224,80,80,0)} }
  .cats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn { background: transparent; border: 1.5px solid #3D1418; border-radius: 20px; padding: 6px 14px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; white-space: nowrap; cursor: pointer; transition: all .15s; }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #F2E5D0; font-weight: 500; }
  #list-view { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .drink-card { background: var(--card); border: 1px solid #3D1418; border-radius: var(--radius); padding: 18px 18px 16px; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden; }
  .drink-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); border-radius:3px 0 0 3px; opacity:0; transition:opacity .15s; }
  .drink-card:active,.drink-card:hover { background:#341018; border-color:var(--accent); }
  .drink-card:active::before,.drink-card:hover::before { opacity:1; }
  .drink-icon { font-size:32px; flex-shrink:0; width:44px; text-align:center; }
  .drink-info { flex:1; min-width:0; }
  .drink-name { font-family:'Playfair Display',serif; font-size:17px; font-weight:500; color:var(--cream); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .drink-meta { font-size:12px; color:var(--muted); display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .tag { background:#3D1418; border-radius:6px; padding:2px 7px; font-size:11px; color:var(--accent); }
  .drink-arrow { color:var(--muted); font-size:18px; flex-shrink:0; }
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-text { font-size:15px; }
  #detail-view { display:none; flex-direction:column; min-height:100vh; }
  .detail-header { background:var(--surface); padding:16px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #3D1418; position:sticky; top:0; z-index:100; }
  .back-btn { background:none; border:none; color:var(--accent); font-size:24px; cursor:pointer; padding:4px; display:flex; align-items:center; }
  .detail-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--cream); flex:1; }
  .tts-btn { background:var(--accent); border:none; border-radius:10px; padding:8px 14px; color:#F2E5D0; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .15s; white-space:nowrap; }
  .tts-btn.playing { background:#e05050; color:#fff; }
  .variant-wrap { padding:16px 20px 0; }
  .variant-toggle { display:flex; background:var(--card); border:1px solid #3D1418; border-radius:12px; padding:4px; gap:4px; }
  .var-btn { flex:1; background:none; border:none; border-radius:9px; padding:10px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; }
  .var-btn.active { background:var(--accent); color:#F2E5D0; }
  .detail-body { padding:20px; display:flex; flex-direction:column; gap:20px; }
  .section-label { font-size:11px; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
  .ingredients-box { background:var(--card); border:1px solid #3D1418; border-radius:var(--radius); padding:16px 18px; }
  .ingredient-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid #3D1418; font-size:15px; line-height:1.4; }
  .ingredient-item:last-child { border-bottom:none; }
  .ingredient-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; flex-shrink:0; margin-top:7px; }
  .steps-list { display:flex; flex-direction:column; gap:10px; }
  .step-item { background:var(--step-bg); border:1px solid #3D1418; border-radius:12px; padding:14px 16px; display:flex; gap:14px; align-items:flex-start; }
  .step-num { background:var(--accent); color:#F2E5D0; font-weight:700; font-size:13px; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
  .step-text { font-size:15px; line-height:1.55; color:var(--cream); }
  mark { background:rgba(200,144,42,0.3); color:var(--accent2); border-radius:3px; padding:0 1px; }
  body::after { content:''; position:fixed; inset:0; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E"); opacity:0.025; z-index:999; }

  if (!query) return true;
  const q = normalize(query);
  const hay = normalize([drink.name,...(drink.tags||[]),...drink.variants.flatMap(v=>[...v.ingredients,...v.steps])].join(' '));
  return q.split(' ').every(p=>hay.includes(p));
}
function highlight(text, query) {
  if (!query) return text;
  query.trim().split(/\s+/).filter(w=>normalize(w).length>1).forEach(word=>{
    const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
    text = text.replace(re,'<mark>$1</mark>');
  });
  return text;
}
function getFiltered() {
  return DRINKS.filter(d=>(currentCategory==='all'||d.category===currentCategory)&&matches(d,currentQuery));
}

// ══════════════════════════════════════════
//  RENDER LIST
// ══════════════════════════════════════════
function renderList() {
  const list = document.getElementById('list-view');
  const filtered = getFiltered();
  if (!filtered.length) {
    list.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Brak wyników dla "<strong>${currentQuery}</strong>"</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(drink=>{
    const varText = drink.variants.length>1?drink.variants.map(v=>v.label).join(' / '):'';
    const tags = (drink.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
    return `<div class="drink-card" onclick="openDrink(${drink.id})">
      <div class="drink-icon">${drink.icon}</div>
      <div class="drink-info">
        <div class="drink-name">${highlight(drink.name,currentQuery)}</div>
        <div class="drink-meta">${varText?`<span>${varText}</span>`:''}${tags}</div>
      </div>
      <div class="drink-arrow">›</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  DETAIL
// ══════════════════════════════════════════
function openDrink(id) {
  stopTTS(); currentDrinkId=id; currentVariant=0;
  const drink=DRINKS.find(d=>d.id===id);
  document.getElementById('list-view-wrapper').style.display='none';
  document.getElementById('detail-view').style.display='flex';
  document.getElementById('detailTitle').textContent=drink.name;
  renderDetail(drink);
}
function renderDetail(drink) {
  const vw=document.getElementById('variantWrap');
  if(drink.variants.length>1){
    vw.style.display='block';
    vw.innerHTML=`<div class="variant-toggle">${drink.variants.map((v,i)=>`<button class="var-btn ${i===currentVariant?'active':''}" onclick="setVariant(${i})">${v.label}</button>`).join('')}</div>`;
  } else { vw.style.display='none'; }
  const v=drink.variants[currentVariant];
  document.getElementById('detailBody').innerHTML=`
    <div><div class="section-label">Składniki</div>
    <div class="ingredients-box">${v.ingredients.map(ing=>`<div class="ingredient-item"><div class="ingredient-dot"></div><span>${ing}</span></div>`).join('')}</div></div>
    <div><div class="section-label">Przygotowanie</div>
    <div class="steps-list">${v.steps.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}</div></div>`;
}
function setVariant(idx){ stopTTS(); currentVariant=idx; renderDetail(DRINKS.find(d=>d.id===currentDrinkId)); }
function goBack(){ stopTTS(); currentDrinkId=null; document.getElementById('detail-view').style.display='none'; document.getElementById('list-view-wrapper').style.display='block'; }

// ══════════════════════════════════════════
//  TTS
// ══════════════════════════════════════════
function buildTTSText(){
  const drink=DRINKS.find(d=>d.id===currentDrinkId);
  const v=drink.variants[currentVariant];
  return `${drink.name}${v.label?` — ${v.label}`:''}.  Składniki: ${v.ingredients.join(', ')}. Przygotowanie: ${v.steps.map((s,i)=>`Krok ${i+1}. ${s}`).join(' ')}`;
}
function startTTS(){
  if(!('speechSynthesis' in window)){alert('Użyj Chrome.');return;}
  stopTTS();
  const utt=new SpeechSynthesisUtterance(buildTTSText());
  utt.lang='pl-PL'; utt.rate=0.9;
  const plVoice=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('pl'));
  if(plVoice) utt.voice=plVoice;
  utt.onstart=()=>{ttsActive=true;const b=document.getElementById('ttsBtn');b.textContent='⏹ Stop';b.classList.add('playing');};
  utt.onend=utt.onerror=()=>{ttsActive=false;const b=document.getElementById('ttsBtn');b.textContent='▶ Czytaj';b.classList.remove('playing');};
  window.speechSynthesis.speak(utt);
}
function stopTTS(){
  window.speechSynthesis?.cancel(); ttsActive=false;
  const b=document.getElementById('ttsBtn');
  if(b){b.textContent='▶ Czytaj';b.classList.remove('playing');}
}
document.getElementById('ttsBtn').addEventListener('click',()=>{ttsActive?stopTTS():startTTS();});

// ══════════════════════════════════════════
//  AUDIO BEEPS
// ══════════════════════════════════════════
let audioCtx=null;
function getAudioCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playBeep(freq,dur,type='sine',vol=0.3){
  try{
    const ctx=getAudioCtx(),osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function beepStart(){playBeep(660,.12);setTimeout(()=>playBeep(880,.18),110);}
function beepStop(){playBeep(880,.08);setTimeout(()=>playBeep(550,.2),70);}
function beepError(){playBeep(300,.3,'sawtooth',.15);}

// ══════════════════════════════════════════
//  VOICE RECOGNITION
// ══════════════════════════════════════════
const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
const micBtn=document.getElementById('micBtn');

if(SpeechRec){
  recognition=new SpeechRec();
  recognition.lang='pl-PL';
  recognition.continuous=false;
  recognition.interimResults=false;

  recognition.onresult=(e)=>{
    const t=e.results[0][0].transcript;
    document.getElementById('searchInput').value=t;
    currentQuery=t; renderList();
    beepStop(); micBtn.classList.remove('listening');
  };
  recognition.onend=()=>{ if(micBtn.classList.contains('listening')){beepStop();micBtn.classList.remove('listening');} };
  recognition.onerror=(e)=>{
    micBtn.classList.remove('listening'); beepError();
    if(e.error==='not-allowed'||e.error==='service-not-allowed') showMicHint();
  };

  micBtn.addEventListener('click',()=>{
    try{getAudioCtx().resume();}catch(e){}
    if(micBtn.classList.contains('listening')){
      recognition.stop(); beepStop(); micBtn.classList.remove('listening'); return;
    }
    micBtn.classList.add('listening'); beepStart();
    try{ recognition.start(); }catch(e){ micBtn.classList.remove('listening'); beepError(); }
  });
} else {
  micBtn.title='Wyszukiwanie głosowe niedostępne (użyj Chrome)';
  micBtn.style.opacity='0.35'; micBtn.style.cursor='not-allowed';
}

function showMicHint(){
  if(document.getElementById('micHint')) return;
  const hint=document.createElement('div');
  hint.id='micHint';
  hint.style.cssText=`position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#3D1418;border:1px solid var(--accent);border-radius:12px;padding:14px 18px;color:var(--cream);font-size:13px;line-height:1.6;max-width:300px;text-align:center;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.5);`;
  hint.innerHTML=`🎙️ Brak uprawnień do mikrofonu.<br>Kliknij ikonę 🔒 w pasku adresu → <strong>Mikrofon</strong> → <strong>Zezwól</strong>, odśwież stronę.<br><br><button onclick="document.getElementById('micHint').remove()" style="background:var(--accent);border:none;border-radius:8px;padding:6px 16px;color:#F2E5D0;cursor:pointer;font-size:13px;">OK</button>`;
  document.body.appendChild(hint);
  setTimeout(()=>hint?.remove(),12000);
}

// ══════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input',e=>{currentQuery=e.target.value;renderList();});
document.getElementById('backBtn').addEventListener('click',goBack);
document.getElementById('catBar').addEventListener('click',e=>{
  const btn=e.target.closest('.cat-btn');
  if(!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory=btn.dataset.cat;
  renderList();
});

window.speechSynthesis?.getVoices();
window.speechSynthesis?.addEventListener?.('voiceschanged',()=>{});
renderList();
</script>
