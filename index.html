<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Piętro Cafe — Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0f0e0c;
    color: #e8e0d0;
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px 48px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: #f5a623;
    letter-spacing: 6px;
    text-align: center;
    margin-bottom: 4px;
  }

  .sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #5a5248;
    text-align: center;
    margin-bottom: 48px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 420px;
  }

  @media (max-width: 360px) {
    .grid { grid-template-columns: 1fr; }
  }

  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1814;
    border: 1px solid #2e2a22;
    border-radius: 10px;
    padding: 28px 16px 24px;
    text-decoration: none;
    color: #e8e0d0;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    min-height: 150px;
    gap: 12px;
  }

  .tile:hover, .tile:active {
    border-color: #f5a623;
    background: #211f1a;
  }

  .tile-icon {
    font-size: 44px;
    line-height: 1;
  }

  .tile-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    text-align: center;
    color: #e8e0d0;
  }

  .tile-desc {
    font-size: 11px;
    color: #5a5248;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.5;
  }

  .tile.highlight {
    border-color: #f5a623;
  }

  .tile.highlight .tile-label {
    color: #f5a623;
  }

  .footer {
    margin-top: 48px;
    font-size: 10px;
    color: #2e2a22;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="logo">Piętro Cafe</div>
  <div class="sub">panel pracownika</div>

  <div class="grid">

    <a class="tile" href="przepisy.html">
      <div class="tile-icon">☕</div>
      <div class="tile-label">Przepisy</div>
      <div class="tile-desc">Kawowe<br>i nie tylko</div>
    </a>

    <a class="tile highlight" href="wrzuc_paragon.html">
      <div class="tile-icon">🧾</div>
      <div class="tile-label">Wrzuć<br>paragon</div>
      <div class="tile-desc">Skanuj<br>faktury</div>
    </a>

    <a class="tile" href="godziny.html">
      <div class="tile-icon">🕐</div>
      <div class="tile-label">Godziny<br>pracy</div>
      <div class="tile-desc">Wpisz<br>zmianę</div>
    </a>

    <a class="tile" href="grafik.html">
      <div class="tile-icon">📅</div>
      <div class="tile-label">Grafik</div>
      <div class="tile-desc">Sprawdź<br>zmiany</div>
    </a>

  </div>

  <div class="footer">piętro · rzeszów</div>

<script src="nav.js"></script>
</body>
</html>
